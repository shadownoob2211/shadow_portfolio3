<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود - Shadow</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="login-section">
        <div class="login-container">
            <h1>🔐 ورود مدیر</h1>
            <form id="loginForm">
                <input type="text" id="username" placeholder="نام کاربری" required>
                <input type="password" id="password" placeholder="رمز عبور" required>
                <button type="submit">ورود</button>
            </form>
            <p style="text-align: center; color: #888; margin-top: 1rem;">
                پیش‌فرض: admin / 12345
            </p>
        </div>
    </section>

    <script>
        console.log('✅ login.html loaded');

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            console.log('🔑 Trying login:', username);

            // پیش‌فرض یا ذخیره شده
            const savedCreds = JSON.parse(localStorage.getItem('credentials')) || {
                username: 'admin',
                password: '12345'
            };

            if (username === savedCreds.username && password === savedCreds.password) {
                console.log('✅ Login successful!');
                
                // ذخیره کاربر
                const user = {
                    username: username,
                    loggedIn: true
                };
                
                localStorage.setItem('currentUser', JSON.stringify(user));
                console.log('💾 Saved currentUser:', user);
                
                // برو داشبورد
                console.log('➡️ Redirecting to dashboard...');
                window.location.href = '/dashboard.html';
            } else {
                alert('❌ نام کاربری یا رمز اشتباه است');
                console.log('❌ Login failed');
            }
        });
    </script>
</body>
</html>
