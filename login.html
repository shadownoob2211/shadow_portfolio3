<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لاگین مدیر - Shadow</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
    <div class="login-container">
        <h1>لاگین مدیر</h1>
        <div class="error" id="error"></div>
        <form id="loginForm">
            <input type="text" id="username" placeholder="نام کاربری" required>
            <input type="password" id="password" placeholder="پسورد" required>
            <button type="submit">ورود</button>
        </form>
        <p class="info">نام کاربری: <strong>admin</strong> | پسورد: <strong>12345</strong></p>
    </div>
    <script src="app.js"></script>
</body>
</html>
